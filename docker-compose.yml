services:
  db:
    # pgvector/pgvector ships Postgres 16 with the `vector` extension preinstalled.
    image: pgvector/pgvector:pg16
    container_name: cadence-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cadence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cadence}
      POSTGRES_DB: ${POSTGRES_DB:-cadence}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - cadence_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cadence} -d ${POSTGRES_DB:-cadence}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cadence_pgdata:
