name: keep-warm

# Pings both Render free-tier services so they don't sleep after 15 min idle,
# keeping the live demo instant for visitors. Render free web services spin
# down after inactivity; a request every ~10 min keeps them awake.
#
# Public repo → GitHub Actions minutes are free. The URLs are public (the same
# ones a browser hits), so nothing secret lives here. /health wakes the AI
# service; the web root wakes the Next.js service.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (GitHub may delay a few min under load)
  workflow_dispatch: {} # allow manual "Run workflow" for testing

# If a run is still going when the next fires, skip rather than pile up.
concurrency:
  group: keep-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping services
        run: |
          # --max-time 90 gives a cold service time to spin up. `|| true` so a
          # slow/cold ping never marks the run failed (would spam failure email).
          for url in \
            "https://cadence-web-ukf3.onrender.com/" \
            "https://cadence-ai-fm9a.onrender.com/health"; do
            code=$(curl -sS -L -o /dev/null -w "%{http_code}" --max-time 90 "$url" || echo "timeout")
            echo "$url -> $code"
          done
